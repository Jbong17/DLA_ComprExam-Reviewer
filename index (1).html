<head>

<title>DLA Comprehensive Exam Reviewer — PhD in DS 2028</title>

<style>
/* ── DESIGN TOKENS ─────────────────────────────────────────────────────────── */
:root {
  --navy-950: #060d1a;
  --navy-900: #0a1628;
  --navy-800: #0f2144;
  --navy-700: #162d5c;
  --navy-600: #1e3a74;
  --blue-500: #3b7dd8;
  --blue-400: #5c97e8;
  --blue-300: #8bb8f4;
  --teal-500: #10b981;
  --teal-400: #34d399;
  --amber-500: #f59e0b;
  --amber-400: #fbbf24;
  --red-500:   #ef4444;
  --red-400:   #f87171;
  --purple-500:#8b5cf6;
  --surface:   #ffffff;
  --surface-2: #f8fafc;
  --surface-3: #f1f5f9;
  --border:    #e2e8f0;
  --border-2:  #cbd5e1;
  --text-1:    #0f172a;
  --text-2:    #334155;
  --text-3:    #64748b;
  --text-4:    #94a3b8;
  --radius-sm: 6px;
  --radius:    10px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow:    0 4px 16px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.05);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.12), 0 4px 12px rgba(0,0,0,.06);
}

/* ── RESET ─────────────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--surface-2);color:var(--text-1);font-size:15px;line-height:1.6;min-height:100vh}

/* ── HEADER ────────────────────────────────────────────────────────────────── */
.hero{
  background:linear-gradient(135deg, var(--navy-950) 0%, var(--navy-800) 50%, #0d2252 100%);
  padding:56px 48px 52px;
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 80% at 80% 30%, rgba(59,125,216,.18) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 10% 70%, rgba(16,185,129,.08) 0%, transparent 50%);
  pointer-events:none;
}
.hero::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent);
}
.hero-kicker{
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:400;
  letter-spacing:.18em;text-transform:uppercase;
  color:rgba(255,255,255,.42);margin-bottom:22px;
}
.hero-title{
  font-family:'EB Garamond',Georgia,serif;font-size:clamp(34px,5vw,62px);
  font-weight:700;color:#ffffff;line-height:1.08;margin-bottom:14px;
  letter-spacing:-.01em;
}
.hero-sub{
  font-family:'EB Garamond',Georgia,serif;
  font-size:clamp(15px,1.8vw,20px);font-weight:400;font-style:normal;
  color:rgba(255,255,255,.62);margin-bottom:8px;letter-spacing:.005em;
}
.hero-author{
  font-family:'JetBrains Mono',monospace;font-size:12px;
  color:rgba(255,255,255,.35);letter-spacing:.05em;margin-bottom:38px;
}
.progress-bar-wrap{
  display:flex;align-items:center;gap:16px;
}
.progress-bar-track{
  flex:1;height:5px;background:rgba(255,255,255,.1);
  border-radius:99px;overflow:hidden;max-width:520px;
}
.progress-bar-fill{
  height:100%;background:linear-gradient(90deg,var(--teal-500),var(--blue-400));
  border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1);width:0%;
}
.progress-label{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  color:rgba(255,255,255,.4);white-space:nowrap;
}
#progress-text{color:rgba(255,255,255,.55)}

/* ── MAIN LAYOUT ───────────────────────────────────────────────────────────── */
.main{max-width:960px;margin:0 auto;padding:40px 24px 100px;}

/* ── DAY CARDS ─────────────────────────────────────────────────────────────── */
.day-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);margin-bottom:16px;
  box-shadow:var(--shadow-sm);overflow:hidden;
  transition:box-shadow .2s;
}
.day-card:hover{box-shadow:var(--shadow)}
.day-header{
  padding:22px 28px 20px;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;
  user-select:none;
  border-bottom:1px solid transparent;
  transition:border-color .2s;
}
.day-card.open .day-header{border-bottom-color:var(--border)}
.day-header-left{display:flex;align-items:center;gap:14px}
.day-chevron{
  width:28px;height:28px;border-radius:50%;
  background:var(--surface-3);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s;color:var(--text-3);
}
.day-card.open .day-chevron{background:var(--navy-800);border-color:var(--navy-800);color:#fff;transform:rotate(180deg)}
.day-chevron svg{width:12px;height:12px}
.day-title-block{}
.day-title{
  font-family:'EB Garamond',Georgia,serif;font-size:19px;font-weight:700;
  color:var(--text-1);display:flex;align-items:center;gap:10px;
  flex-wrap:wrap;line-height:1.25;
}
.day-meta{font-size:12px;color:var(--text-3);margin-top:3px}
.day-meta span{margin-right:10px}
.day-progress-ring{
  width:52px;height:52px;flex-shrink:0;
}
.ring-track{fill:none;stroke:var(--border);stroke-width:3.5}
.ring-fill{
  fill:none;stroke:var(--teal-500);stroke-width:3.5;
  stroke-linecap:round;
  transform:rotate(-90deg);transform-origin:50% 50%;
  transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1);
}
.ring-text{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;fill:var(--text-3);text-anchor:middle;dominant-baseline:central}

/* Priority badges */
.badge{display:inline-flex;align-items:center;height:20px;padding:0 7px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.06em}
.badge-critical{background:#fef2f2;color:var(--red-500);border:1px solid #fecaca}
.badge-important{background:#fffbeb;color:#b45309;border:1px solid #fde68a}
.badge-standard{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
.badge-day{background:var(--navy-800);color:#93c5fd;border:1px solid var(--navy-700);font-size:10px}

/* ── DAY BODY ──────────────────────────────────────────────────────────────── */
.day-body{display:none;padding:0 28px 28px;}
.day-card.open .day-body{display:block}
.notebook-actions{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  padding:18px 0 20px;border-bottom:1px solid var(--border);
  margin-bottom:4px;
}
.btn-colab{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--amber-500);color:#000;
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;
  padding:9px 16px;border-radius:var(--radius-sm);
  text-decoration:none;border:none;cursor:pointer;
  transition:background .15s,transform .1s;
  letter-spacing:.02em;
}
.btn-colab:hover{background:var(--amber-400);transform:translateY(-1px)}
.btn-colab svg{width:15px;height:15px;flex-shrink:0}
.btn-download{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--surface-3);color:var(--text-2);
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
  padding:9px 16px;border-radius:var(--radius-sm);
  text-decoration:none;border:1px solid var(--border-2);cursor:pointer;
  transition:all .15s;
}
.btn-download:hover{background:var(--navy-800);color:#fff;border-color:var(--navy-800);transform:translateY(-1px)}
.btn-download svg{width:13px;height:13px}
.notebook-filename{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  color:var(--text-4);padding:8px 12px;background:var(--surface-3);
  border-radius:var(--radius-sm);border:1px solid var(--border);
}

/* ── TOPIC LIST ────────────────────────────────────────────────────────────── */
.topic-list{padding-top:8px}
.topic-item{
  display:flex;gap:14px;align-items:flex-start;
  padding:14px 0;position:relative;
}
.topic-item::before{
  content:'';position:absolute;left:12px;top:36px;bottom:-4px;
  width:1.5px;background:var(--border);
}
.topic-item:last-child::before{display:none}
.topic-check-wrap{flex-shrink:0;padding-top:2px}
.topic-check{
  width:24px;height:24px;border-radius:50%;
  border:2px solid var(--border-2);background:var(--surface);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
}
.topic-check:hover{border-color:var(--teal-500);background:#f0fdf4}
.topic-check.checked{
  background:var(--teal-500);border-color:var(--teal-500);
}
.topic-check.checked svg{opacity:1}
.topic-check svg{width:12px;height:12px;opacity:0;color:#fff;transition:opacity .1s}
.topic-body{flex:1;min-width:0}
.topic-title-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:3px}
.topic-title{font-size:14px;font-weight:500;color:var(--text-1)}
.topic-desc{font-size:12.5px;color:var(--text-3);line-height:1.55;margin-bottom:7px}
.topic-footer{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ref{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  color:var(--blue-500);background:#eff6ff;padding:2px 8px;border-radius:4px;
  border:1px solid #bfdbfe;text-decoration:none;
}
.tag{
  font-size:11px;padding:2px 8px;border-radius:4px;
  background:var(--surface-3);color:var(--text-3);border:1px solid var(--border);
}

/* ── FLOATING CONTROLS ─────────────────────────────────────────────────────── */
.fab-row{
  position:fixed;bottom:28px;right:28px;
  display:flex;flex-direction:column;gap:10px;align-items:flex-end;z-index:100;
}
.fab{
  display:flex;align-items:center;gap:8px;
  padding:10px 16px;border-radius:99px;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
  box-shadow:var(--shadow-lg);transition:all .15s;
}
.fab-reset{background:var(--surface);color:var(--text-2);border:1px solid var(--border)}
.fab-expand{background:var(--navy-800);color:#fff}
.fab:hover{transform:translateY(-2px)}

/* ── RESPONSIVE ────────────────────────────────────────────────────────────── */
@media(max-width:600px){
  .hero{padding:36px 20px 36px}
  .main{padding:24px 12px 80px}
  .day-header{padding:16px 18px 14px}
  .day-body{padding:0 18px 22px}
  .notebook-filename{display:none}
}
</style>
</head>

/* ── STATE ──────────────────────────────────────────────────────────────────── */
const STORAGE_KEY = 'dla_reviewer_v1';
let state = {};

function loadState(){
  try { state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch(e){ state = {}; }
}

function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function isChecked(id){ return !!state[id]; }

function toggleTopic(id, dayId){
  state[id] = !isChecked(id);
  saveState();
  renderCheck(id);
  updateDayProgress(dayId);
  updateGlobalProgress();
}

/* ── RENDER ─────────────────────────────────────────────────────────────────── */
function priorityBadge(p){
  if(p === 'critical')  return `<span class="badge badge-critical">CRITICAL</span>`;
  if(p === 'important') return `<span class="badge badge-important">KEY</span>`;
  return '';
}

function renderDay(day){
  const totalTopics = day.topics.length;
  const doneTopics  = day.topics.filter(t => isChecked(t.id)).length;
  const pct         = totalTopics ? Math.round(doneTopics / totalTopics * 100) : 0;

  const r      = 20;
  const circ   = 2 * Math.PI * r;
  const offset = circ - (pct / 100) * circ;

  const topicsHTML = day.topics.map(t => `
    <div class="topic-item" id="item-${t.id}">
      <div class="topic-check-wrap">
        <div class="topic-check ${isChecked(t.id)?'checked':''}" id="chk-${t.id}"
             onclick="toggleTopic('${t.id}','${day.id}')">
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1.5,6 4.5,9 10.5,3"/>
          </svg>
        </div>
      </div>
      <div class="topic-body">
        <div class="topic-title-row">
          <span class="topic-title">${t.title}</span>
          ${priorityBadge(t.priority)}
        </div>
        <div class="topic-desc">${t.desc}</div>
        <div class="topic-footer">
          <span class="ref">📖 ${t.ref}</span>
          ${t.tags.map(g=>`<span class="tag">${g}</span>`).join('')}
        </div>
      </div>
    </div>
  `).join('');

  const nbFile  = day.notebook;
  const colabUrl= colabBase + encodeURIComponent(nbFile);
  const rawUrl  = rawBase   + encodeURIComponent(nbFile);

  return `
  <div class="day-card" id="card-${day.id}">
    <div class="day-header" onclick="toggleDay('${day.id}')">
      <div class="day-header-left">
        <div class="day-chevron" id="chev-${day.id}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
        </div>
        <div class="day-title-block">
          <div class="day-title">
            ${day.title}
            <span class="badge badge-day">${day.badge}</span>
          </div>
          <div class="day-meta">
            <span>${day.meta.chapters}</span>
            <span>·</span>
            <span>${day.meta.hours} hrs/day</span>
            <span>·</span>
            <span id="done-${day.id}">${doneTopics}/${totalTopics} done</span>
          </div>
        </div>
      </div>
      <svg class="day-progress-ring" viewBox="0 0 52 52">
        <circle class="ring-track" cx="26" cy="26" r="${r}"/>
        <circle class="ring-fill" cx="26" cy="26" r="${r}"
          stroke-dasharray="${circ}"
          stroke-dashoffset="${offset}"
          id="ring-${day.id}"/>
        <text class="ring-text" x="26" y="26" id="ring-txt-${day.id}">${pct}%</text>
      </svg>
    </div>
    <div class="day-body">
      <div class="notebook-actions">
        <a class="btn-colab" href="${colabUrl}" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
          Open in Colab
        </a>
        <a class="btn-download" href="${rawUrl}" download="${nbFile}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download .ipynb
        </a>
        <span class="notebook-filename">${nbFile}</span>
      </div>
      <div class="topic-list">${topicsHTML}</div>
    </div>
  </div>`;
}

function render(){
  const container = document.getElementById('main-content');
  container.innerHTML = DAYS.map(renderDay).join('');
  updateGlobalProgress();
}

/* ── INTERACTIONS ───────────────────────────────────────────────────────────── */
function toggleDay(id){
  const card = document.getElementById('card-'+id);
  card.classList.toggle('open');
}

let allExpanded = false;
function toggleAll(){
  allExpanded = !allExpanded;
  DAYS.forEach(d => {
    const card = document.getElementById('card-'+d.id);
    if(allExpanded) card.classList.add('open');
    else card.classList.remove('open');
  });
  const btn = document.getElementById('fab-toggle');
  btn.innerHTML = allExpanded
    ? `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 15l-6-6-6 6"/></svg> Collapse All`
    : `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg> Expand All`;
}

function renderCheck(id){
  const el = document.getElementById('chk-'+id);
  if(!el) return;
  if(isChecked(id)) el.classList.add('checked');
  else el.classList.remove('checked');
}

function updateDayProgress(dayId){
  const day = DAYS.find(d=>d.id===dayId);
  if(!day) return;
  const total = day.topics.length;
  const done  = day.topics.filter(t=>isChecked(t.id)).length;
  const pct   = total ? Math.round(done/total*100) : 0;
  const r     = 20;
  const circ  = 2*Math.PI*r;
  const ring  = document.getElementById('ring-'+dayId);
  const rtxt  = document.getElementById('ring-txt-'+dayId);
  const dtxt  = document.getElementById('done-'+dayId);
  if(ring) ring.setAttribute('stroke-dashoffset', circ-(pct/100)*circ);
  if(rtxt) rtxt.textContent = pct+'%';
  if(dtxt) dtxt.textContent = `${done}/${total} done`;
}

function updateGlobalProgress(){
  const allTopics = DAYS.flatMap(d=>d.topics);
  const total = allTopics.length;
  const done  = allTopics.filter(t=>isChecked(t.id)).length;
  const pct   = total ? Math.round(done/total*100) : 0;
  const fill  = document.getElementById('global-fill');
  const ptxt  = document.getElementById('progress-text');
  const ppct  = document.getElementById('progress-pct');
  if(fill) fill.style.width = pct+'%';
  if(ptxt) ptxt.textContent = `${done}/${total} topics`;
  if(ppct) ppct.textContent = pct+'%';
}

function resetProgress(){
  if(!confirm('Reset all progress? This cannot be undone.')) return;
  state = {};
  saveState();
  render();
}

/* ── INIT ───────────────────────────────────────────────────────────────────── */
loadState();
render();
// Open the first day by default
document.getElementById('card-d1')?.classList.add('open');
</script>
