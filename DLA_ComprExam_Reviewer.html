      { id:"w5t6", n:"Continual and Few-Shot Learning", d:"Catastrophic forgetting, EWC, prototypical networks, MAML", ch:"§5.6", sk:["EWC","Prototypical networks","MAML"], p:"MEDIUM" }

      { q:"Explain the SimCLR framework. What is the NT-Xent loss and why is it effective?",
        a:"SimCLR: (1) Take image xᵢ, apply two random augmentations → {x̃ᵢ, x̃ⱼ} (a positive pair). (2) Encode both: hᵢ=f(x̃ᵢ), hⱼ=f(x̃ⱼ). (3) Project: zᵢ=g(hᵢ), zⱼ=g(hⱼ). NT-Xent loss for pair (i,j): L = −log[exp(sim(zᵢ,zⱼ)/τ) / Σ_{k≠i} exp(sim(zᵢ,zₖ)/τ)] where sim=cosine similarity, τ=temperature. Effectiveness: (1) Large batch provides many negatives in-batch, (2) Temperature τ controls hardness of negatives, (3) Projection head maps to better contrastive space while encoder retains useful features, (4) Strong augmentations force learning semantically invariant representations.",
